spring:
  application:
    name: order-service
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/order_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: IST
  flyway:
    enabled: true
    locations: classpath:db/migration


server:
  port: 8081
  servelt:
    context-path: /orders

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized


orderengine:
  idempodency:
    enabled: false